<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cute Lamp Login | Copyright by @ilmah</title>
    <link rel="stylesheet" href="index.css">
    <script src="https://unpkg.com/gsap@3/dist/gsap.min.js"></script>
    <script src="https://unpkg.com/gsap@3/dist/Draggable.min.js"></script>
</head>
<body data-on="false">

<div class="container">
    <div class="lamp-wrapper">
        <svg class="lamp-svg" viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
            <ellipse class="inner-glow" cx="100" cy="110" rx="60" ry="30" />
            
            <rect class="lamp-base" x="92" y="100" width="16" height="160" rx="8" />
            
            <rect class="lamp-base" x="60" y="250" width="80" height="12" rx="6" />

            <g class="pull-cord">
                <line class="cord-line" x1="130" y1="110" x2="130" y2="180" />
                <circle class="cord-bead" cx="130" cy="190" r="6" />
                <circle class="cord-hit" cx="130" cy="190" r="25" fill="transparent" />
            </g>

            <path class="lamp-shade" d="M30 110 C 30 50, 170 50, 170 110 C 170 125, 30 125, 30 110 Z" />
        </svg>
    </div>

    <div class="login-form">
        <h2>Welcome</h2>
        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Your name" />
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="password-wrapper">
                <input type="password" id="password" placeholder="••••••••">
                <button type="button" class="password-toggle" onclick="togglePassword()">
                <svg class="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path class="eye-open" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle class="eye-open" cx="12" cy="12" r="3"></circle>
                <path class="eye-closed" d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" style="display: none;"></path>
                <line class="eye-closed" x1="1" y1="1" x2="23" y2="23" style="display: none;"></line>
            </svg>
        </button>
    </div>
        <button type="submit" class="login-btn">Sign In</button>
    </form>
    </div>
</div>

<script src="index.js"></script>

</body>
</html>
